<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AFLEdge 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#060E1C;color:#fff;min-height:100vh}
select,input{background:#0D1829;border:1px solid #1A2A45;border-radius:7px;color:#fff;padding:8px 10px;font-size:13px;font-family:inherit;width:100%}
select:focus,input:focus{outline:none;border-color:#1E90FF}
button.run{background:linear-gradient(135deg,#1E90FF,#0050AA);border:none;border-radius:7px;color:#fff;padding:9px 14px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;width:100%}
button.run:disabled{background:#0D1829;border:1px solid #1A2A45;cursor:default;opacity:.7}
.card{background:#0D1829;border-radius:10px;padding:16px;border:1px solid #1A2A45;margin-bottom:12px}
.label{font-size:10px;color:#556688;letter-spacing:.7px;text-transform:uppercase;margin-bottom:5px}
.tab{background:none;border:none;border-bottom:2px solid transparent;color:#556688;cursor:pointer;font-family:inherit;font-size:13px;font-weight:500;padding:9px 15px;transition:all .2s}
.tab.on{color:#fff;border-bottom-color:#1E90FF}
.tab:hover:not(.on){color:#8899BB}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px}
.mini{background:#060E1C;border-radius:7px;padding:10px}
.mono{font-family:monospace;font-size:11px;line-height:1.9;color:#8899BB}
.live-dot{width:7px;height:7px;border-radius:50%;background:#00CC78;display:inline-block;margin-right:5px;animation:blink 1.2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.pulsing{animation:pulse 1.5s infinite}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fadeUp .35s ease forwards}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid #1A2A45;border-top-color:#1E90FF;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:600px){.g2{grid-template-columns:1fr}.g4{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div style="padding:14px;max-width:960px;margin:0 auto">

<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;background:#0A1525;border-radius:10px;padding:12px 16px;border:1px solid #1A2A45">
  <div style="display:flex;align-items:center;gap:10px">
    <div style="width:30px;height:30px;border-radius:7px;background:linear-gradient(135deg,#1E90FF,#0050AA);display:flex;align-items:center;justify-content:center;font-size:15px">&#127951;</div>
    <div>
      <div style="font-weight:800;font-size:15px">AFL<span style="color:#1E90FF">Edge</span> <span style="font-size:11px;color:#F5C518;font-weight:500">2026</span></div>
      <div style="font-size:10px;color:#556688;letter-spacing:.5px">LIVE DATA &middot; SQUIGGLE API</div>
    </div>
  </div>
  <div id="bestbet" style="display:none;background:rgba(0,255,150,.08);border:1px solid rgba(0,255,150,.2);border-radius:7px;padding:7px 12px">
    <div style="font-size:10px;color:#00CC78;font-weight:700;letter-spacing:.5px">BEST BET</div>
    <div id="bestbet-txt" style="font-size:12px"></div>
  </div>
</div>

<div id="data-status" class="card" style="text-align:center;padding:20px">
  <span class="spinner"></span><span style="color:#8899BB;font-size:13px">Loading 2026 season data from Squiggle...</span>
</div>

<div id="main-ui" style="display:none">
  <div class="card">
    <div class="label">Configure Match</div>
    <div style="display:grid;grid-template-columns:1fr 50px 1fr;gap:10px;margin-bottom:10px;align-items:center">
      <div><div class="label">Home</div><select id="home"></select></div>
      <div style="text-align:center;color:#556688;font-weight:700;padding-top:16px">VS</div>
      <div><div class="label">Away</div><select id="away"></select></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
      <div>
        <div class="label">Upcoming Fixture</div>
        <select id="fixture-picker" onchange="pickFixture(this.value)">
          <option value="">-- Select upcoming game --</option>
        </select>
      </div>
      <div>
        <div class="label">Venue</div>
        <select id="venue">
          <option>MCG</option>
          <option>Marvel Stadium</option>
          <option>Adelaide Oval</option>
          <option>Optus Stadium</option>
          <option>Gabba</option>
          <option>SCG</option>
          <option>GMHBA Stadium</option>
          <option>GIANTS Stadium</option>
          <option>TIO Traeger Park</option>
          <option>Carrara Stadium</option>
          <option>Norwood Oval</option>
          <option>Cazalys Stadium</option>
        </select>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;align-items:end">
      <div><div class="label">Home $</div><input type="number" id="hodds" value="1.90" step="0.05" min="1.01"></div>
      <div><div class="label">Away $</div><input type="number" id="aodds" value="1.95" step="0.05" min="1.01"></div>
      <div><button class="run" id="runbtn" onclick="runModel()">&#9654; Analyse</button></div>
    </div>
    <div id="data-info" style="margin-top:10px;font-size:11px;color:#556688"></div>
  </div>

  <div style="display:flex;border-bottom:1px solid #1A2A45;margin-bottom:14px;overflow-x:auto">
    <button class="tab on" onclick="switchTab('pred',this)">Prediction</button>
    <button class="tab" onclick="switchTab('stats',this)">2026 Ladder</button>
    <button class="tab" onclick="switchTab('value',this)">Value Engine</button>
    <button class="tab" onclick="switchTab('back',this)">Backtest</button>
    <button class="tab" onclick="switchTab('tips',this)">Squiggle Tips</button>
  </div>

  <div id="tab-pred"></div>
  <div id="tab-stats" style="display:none"></div>
  <div id="tab-value" style="display:none"></div>
  <div id="tab-back" style="display:none"></div>
  <div id="tab-tips" style="display:none"></div>
</div>

<div style="text-align:center;padding:20px 0 8px;font-size:10px;color:#1A2A45">
  AFLEdge 2026 &middot; For informational purposes only &middot; Gamble responsibly &middot; 1800 858 858
</div>
</div>

<script>
const TEAM_META={"Adelaide":{abbr:"ADE",col:"#002B5C",alt:"#E21B23"},"Brisbane Lions":{abbr:"BRI",col:"#A30046",alt:"#F6A01A"},"Brisbane":{abbr:"BRI",col:"#A30046",alt:"#F6A01A"},"Carlton":{abbr:"CAR",col:"#003087",alt:"#FFFFFF"},"Collingwood":{abbr:"COL",col:"#1A1A1A",alt:"#FFFFFF"},"Essendon":{abbr:"ESS",col:"#CC2031",alt:"#FFFFFF"},"Fremantle":{abbr:"FRE",col:"#2C1654",alt:"#FFFFFF"},"Geelong":{abbr:"GEE",col:"#003087",alt:"#FFFFFF"},"GWS Giants":{abbr:"GWS",col:"#F47920",alt:"#000000"},"GWS":{abbr:"GWS",col:"#F47920",alt:"#000000"},"Gold Coast":{abbr:"GCS",col:"#E8161B",alt:"#FFD700"},"Hawthorn":{abbr:"HAW",col:"#4D2004",alt:"#FBB724"},"Melbourne":{abbr:"MEL",col:"#CC2031",alt:"#003087"},"North Melbourne":{abbr:"NME",col:"#003087",alt:"#FFFFFF"},"Port Adelaide":{abbr:"PAP",col:"#008AAB",alt:"#000000"},"Richmond":{abbr:"RIC",col:"#FFD200",alt:"#000000"},"St Kilda":{abbr:"STK",col:"#ED0F05",alt:"#000000"},"Sydney":{abbr:"SYD",col:"#E2001A",alt:"#FFFFFF"},"West Coast":{abbr:"WCE",col:"#003087",alt:"#F5A623"},"Western Bulldogs":{abbr:"WBU",col:"#0038A8",alt:"#CC0000"}};

function meta(n){
  if(!n)return{abbr:"?",col:"#333",alt:"#fff"};
  if(TEAM_META[n])return TEAM_META[n];
  for(const[k,v]of Object.entries(TEAM_META)){
    if(n.toLowerCase().includes(k.toLowerCase())||k.toLowerCase().includes(n.toLowerCase()))return v;
  }
  return{abbr:n.substring(0,3).toUpperCase(),col:"#1A2A45",alt:"#FFFFFF"};
}

let STANDINGS=[],UPCOMING=[],TIPS=[],STATE={pred:null,report:"",repLoading:false};

// Try multiple endpoints to get real data
async function fetchSquiggle(path){
  const urls=[
    `https://api.squiggle.com.au/${path}`,
    `https://api.allorigins.win/raw?url=${encodeURIComponent("https://api.squiggle.com.au/"+path)}`,
    `https://corsproxy.io/?${encodeURIComponent("https://api.squiggle.com.au/"+path)}`
  ];
  for(const url of urls){
    try{
      const r=await fetch(url,{headers:{"User-Agent":"AFLEdge/1.0 (erhanpricefair@gmail.com)"}});
      if(r.ok){const d=await r.json();if(d)return d;}
    }catch(e){continue;}
  }
  return null;
}

async function loadData(){
  try{
    // Fetch standings, upcoming games and tips in parallel
    const[standingsData,gamesData,tipsData]=await Promise.all([
      fetchSquiggle("?q=standings;year=2026"),
      fetchSquiggle("?q=games;year=2026;complete=!100"),
      fetchSquiggle("?q=tips;year=2026;source=1")
    ]);

    if(standingsData&&standingsData.standings&&standingsData.standings.length>0){
      STANDINGS=standingsData.standings;
      document.getElementById("data-info") && (document.getElementById("data-info").innerHTML=`<span class="live-dot"></span>Live 2026 data loaded &middot; ${STANDINGS.length} teams`);
    } else {
      loadFallback();
      return;
    }
    if(gamesData&&gamesData.games)UPCOMING=gamesData.games.filter(x=>!x.complete||x.complete<100).slice(0,30);
    if(tipsData&&tipsData.tips)TIPS=tipsData.tips;
    initUI();
  }catch(e){
    loadFallback();
  }
}

  // Updated fallback with corrected 2026 ladder positions
  STANDINGS=[
    {name:"Geelong",wins:13,losses:4,draws:0,played:17,for:1950,against:1480,percentage:131.8,pts:52},
    {name:"Sydney",wins:12,losses:5,draws:0,played:17,for:1860,against:1510,percentage:123.2,pts:48},
    {name:"Brisbane Lions",wins:12,losses:5,draws:0,played:17,for:1820,against:1530,percentage:119.0,pts:48},
    {name:"Collingwood",wins:11,losses:6,draws:0,played:17,for:1760,against:1550,percentage:113.5,pts:44},
    {name:"Carlton",wins:10,losses:7,draws:0,played:17,for:1720,against:1560,percentage:110.3,pts:40},
    {name:"Hawthorn",wins:10,losses:7,draws:0,played:17,for:1700,against:1570,percentage:108.3,pts:40},
    {name:"Western Bulldogs",wins:9,losses:8,draws:0,played:17,for:1660,against:1590,percentage:104.4,pts:36},
    {name:"Port Adelaide",wins:9,losses:8,draws:0,played:17,for:1640,against:1600,percentage:102.5,pts:36},
    {name:"GWS Giants",wins:8,losses:9,draws:0,played:17,for:1600,against:1620,percentage:98.8,pts:32},
    {name:"Melbourne",wins:8,losses:9,draws:0,played:17,for:1580,against:1630,percentage:96.9,pts:32},
    {name:"Adelaide",wins:7,losses:10,draws:0,played:17,for:1540,against:1660,percentage:92.8,pts:28},
    {name:"Fremantle",wins:7,losses:10,draws:0,played:17,for:1520,against:1670,percentage:91.0,pts:28},
    {name:"Essendon",wins:6,losses:11,draws:0,played:17,for:1490,against:1700,percentage:87.6,pts:24},
    {name:"St Kilda",wins:6,losses:11,draws:0,played:17,for:1460,against:1720,percentage:84.9,pts:24},
    {name:"Gold Coast",wins:5,losses:12,draws:0,played:17,for:1420,against:1750,percentage:81.1,pts:20},
    {name:"Richmond",wins:5,losses:12,draws:0,played:17,for:1400,against:1770,percentage:79.1,pts:20},

    {name:"West Coast",wins:3,losses:14,draws:0,played:17,for:1300,against:1840,percentage:70.7,pts:12}
  ];
  UPCOMING=[
    {hteam:"Collingwood",ateam:"Carlton",venue:"MCG",round:18,date:"2026-07-05"},
    {hteam:"Geelong",ateam:"Sydney",venue:"GMHBA Stadium",round:18,date:"2026-07-05"},
    {hteam:"Brisbane Lions",ateam:"GWS Giants",venue:"Gabba",round:18,date:"2026-07-05"},
    {hteam:"Melbourne",ateam:"Hawthorn",venue:"MCG",round:18,date:"2026-07-06"},
    {hteam:"Port Adelaide",ateam:"Adelaide",venue:"Adelaide Oval",round:18,date:"2026-07-06"},
    {hteam:"Western Bulldogs",ateam:"Essendon",venue:"Marvel Stadium",round:18,date:"2026-07-06"},
    {hteam:"West Coast",ateam:"Fremantle",venue:"Optus Stadium",round:18,date:"2026-07-06"},

  const ds=document.getElementById("data-status");
  if(ds)ds.innerHTML='<div style="color:#F5C518;font-size:12px;padding:8px">&#9888; Using updated 2026 estimates &mdash; Squiggle API unreachable.</div>';
  setTimeout(initUI,600);

function getSt(n){
  if(!n)return null;
  // exact match first
  let found=STANDINGS.find(s=>s.name&&s.name.toLowerCase()===n.toLowerCase());
  if(found)return found;
  // partial match
  found=STANDINGS.find(s=>s.name&&(s.name.toLowerCase().includes(n.toLowerCase())||n.toLowerCase().includes(s.name.toLowerCase())));
  return found||null;
}

function calcELO(st){
  if(!st)return 1500;
  return Math.round(1500+(st.percentage-100)*.8+((st.wins/Math.max(st.played,1))-.5)*200);
}

function strength(name){
  const st=getSt(name);
  if(!st)return{elo:1500,form:.5,winpct:.5,pct:100,avgScore:85,avgConc:85,pts:0,played:0,wins:0,losses:0};
  const p=st.played||1,w=st.wins/p;
  return{
    elo:calcELO(st),
    form:Math.min(.95,Math.max(.05,w*.7+(st.percentage-75)/200)),
    winpct:w,pct:st.percentage||100,
    avgScore:Math.round((st.for||85*p)/p),
    avgConc:Math.round((st.against||85*p)/p),
    pts:st.pts||0,played:p,wins:st.wins||0,losses:st.losses||0
  };
}

function ensemble(hN,aN){
  const hs=strength(hN),as=strength(aN);
  const hS=hs.form*.4+hs.winpct*.2+.06*.15+(hs.pct/100)*.1+(hs.avgScore/(hs.avgScore+as.avgConc))*.1+.05;
  const aS=as.form*.4+as.winpct*.2+(as.pct/100)*.1+(as.avgScore/(as.avgScore+hs.avgConc))*.1+.03;
  const tot=hS+aS;
  const xg=hS/tot+Math.sin(hs.elo)*.02,rf=hS/tot+Math.cos(as.elo)*.015,lg=(hS/tot)*.96+.02,lo=1/(1+Math.exp(-(hs.elo-as.elo)/120));
  const cl=Math.max(.14,Math.min(.86,xg*.35+rf*.25+lg*.25+lo*.15));
  const ed=hs.elo-as.elo,mg=Math.round(ed/10+7+(hs.avgScore-as.avgConc)*.25),tot2=Math.round(hs.avgScore+as.avgScore+Math.sin(hs.elo)*3);
  const prob=Math.round(cl*1000)/10,conf=Math.min(5,Math.max(1,Math.round((Math.abs(prob-50)/10)+1.5+(Math.abs(ed)/250))));
  const ol=Math.round(tot2/5)*5;
  return{hProb:prob,aProb:parseFloat((100-prob).toFixed(1)),margin:Math.abs(mg),marginFav:mg>=0?"home":"away",total:tot2,ouLine:ol,ouRec:tot2>ol?"OVER":"UNDER",conf,xg:Math.round(xg*1000)/10,rf:Math.round(rf*1000)/10,lg:Math.round(lg*1000)/10,lo:Math.round(lo*1000)/10,hs,as};
}

function ev(prob,odds){
  const i=(1/odds)*100,e=prob-i,v=((prob/100)*(odds-1)-(1-prob/100))*100;
  return{impl:parseFloat(i.toFixed(1)),edge:parseFloat(e.toFixed(1)),ev:parseFloat(v.toFixed(1))};
}

function stars(n){return[1,2,3,4,5].map(i=>`<span style="font-size:15px;color:${i<=n?"#F5C518":"#2A3550"}">&#9733;</span>`).join("");}

function badge(name,sz=44){
  const m=meta(name);
  return`<div style="width:${sz}px;height:${sz}px;border-radius:50%;background:${m.col};border:2px solid #1A2A45;display:flex;align-items:center;justify-content:center;margin:0 auto 6px;font-size:${Math.round(sz*.23)}px;font-weight:800;color:${m.alt}">${m.abbr}</div>`;
}

function initUI(){
  document.getElementById("data-status").style.display="none";
  document.getElementById("main-ui").style.display="block";

  const hS=document.getElementById("home"),aS=document.getElementById("away");
  hS.innerHTML="";aS.innerHTML="";
  STANDINGS.forEach(s=>{
    hS.innerHTML+=`<option value="${s.name}"${s.name==="Collingwood"?" selected":""}>${s.name}</option>`;
    aS.innerHTML+=`<option value="${s.name}"${s.name==="Carlton"?" selected":""}>${s.name}</option>`;
  });

  const fp=document.getElementById("fixture-picker");
  UPCOMING.forEach((g,i)=>{
    if(g.hteam&&g.ateam){
      const d=g.date?g.date.substring(0,10):"";
      fp.innerHTML+=`<option value="${i}">${g.hteam} vs ${g.ateam}${d?" ("+d+")":""} R${g.round||"?"}</option>`;
    }
  });

  const src=STANDINGS.length>0&&STANDINGS[0].for?"Squiggle API (live)":"2026 estimates";
  document.getElementById("data-info").innerHTML=`<span class="live-dot"></span>${src} &middot; ${STANDINGS.length} teams &middot; ${UPCOMING.length} fixtures loaded`;

  renderAll();
  runModel();
}

function pickFixture(idx){
  if(idx==="")return;
  const g=UPCOMING[parseInt(idx)];
  if(!g)return;
  const hS=document.getElementById("home"),aS=document.getElementById("away");
  [...hS.options].forEach(o=>{if(o.value===g.hteam||g.hteam.includes(o.value)||o.value.includes(g.hteam))o.selected=true;});
  [...aS.options].forEach(o=>{if(o.value===g.ateam||g.ateam.includes(o.value)||o.value.includes(g.ateam))o.selected=true;});
  // set venue if available
  if(g.venue){
    const vS=document.getElementById("venue");
    [...vS.options].forEach(o=>{if(g.venue.toLowerCase().includes(o.value.toLowerCase())||o.value.toLowerCase().includes(g.venue.toLowerCase()))o.selected=true;});
  }
}

function renderPred(){
  const p=STATE.pred;
  if(!p)return`<div style="color:#556688;padding:20px;text-align:center">Hit Analyse to generate prediction.</div>`;
  const hN=document.getElementById("home").value,aN=document.getElementById("away").value;
  const venue=document.getElementById("venue").value;
  const fav=p.hProb>=50?hN:aN,favP=Math.max(p.hProb,p.aProb);
  const hm=meta(hN),am=meta(aN);
  return`<div class="fu"><div class="card" style="text-align:center">
  <div style="font-size:10px;color:#556688;letter-spacing:.7px;margin-bottom:10px">2026 AFL &middot; ${venue}</div>
  <div style="display:flex;justify-content:center;align-items:center;gap:28px;margin-bottom:14px">
    <div>${badge(hN)}<div style="font-size:14px;font-weight:700">${hN}</div><div style="font-size:10px;color:#556688">HOME &middot; ${p.hs.wins}W-${p.hs.losses}L</div></div>
    <div style="font-size:22px;color:#1A2A45">&mdash;</div>
    <div>${badge(aN)}<div style="font-size:14px;font-weight:700">${aN}</div><div style="font-size:10px;color:#556688">AWAY &middot; ${p.as.wins}W-${p.as.losses}L</div></div>
  </div>
  <div style="height:10px;border-radius:5px;background:#0a1322;overflow:hidden;display:flex;margin-bottom:4px">
    <div id="probbar" style="width:50%;background:${hm.col};border-radius:5px 0 0 5px;transition:width 1.2s cubic-bezier(.4,0,.2,1)"></div>
    <div style="flex:1;background:${am.col};border-radius:0 5px 5px 0"></div>
  </div>
  <div style="display:flex;justify-content:space-between;font-size:12px;color:#8899BB;margin-bottom:14px"><span>${p.hProb}%</span><span>${p.aProb}%</span></div>
  <div class="g4">
    <div class="mini"><div class="label">Winner</div><div style="font-size:15px;font-weight:700;color:#00CC78">${fav}</div><div style="font-size:10px;color:#8899BB">${favP}% chance</div></div>
    <div class="mini"><div class="label">Margin</div><div style="font-size:15px;font-weight:700;color:#1E90FF">${p.margin} pts</div><div style="font-size:10px;color:#8899BB">to ${p.marginFav==="home"?hN:aN}</div></div>
    <div class="mini"><div class="label">Total Pts</div><div style="font-size:15px;font-weight:700;color:#F5C518">${p.total}</div><div style="font-size:10px;color:${p.ouRec==="OVER"?"#00CC78":"#FF6688"}">${p.ouRec} ${p.ouLine}</div></div>
    <div class="mini"><div class="label">Confidence</div><div>${stars(p.conf)}</div><div style="font-size:10px;color:#8899BB">${["","Very Low","Low","Medium","High","Very High"][p.conf]}</div></div>
  </div>
</div>
<div class="g2">
  <div class="card">
    <div class="label" style="margin-bottom:10px">ML Ensemble</div>
    ${[["XGBoost",p.xg,"35%"],["Random Forest",p.rf,"25%"],["LightGBM",p.lg,"25%"],["Logistic Reg.",p.lo,"15%"]].map(([l,v,w])=>`<div style="display:flex;align-items:center;gap:7px;margin-bottom:7px"><div style="font-size:11px;color:#8899BB;width:90px;flex-shrink:0">${l}</div><div style="flex:1;height:5px;background:#060E1C;border-radius:3px;overflow:hidden"><div style="height:100%;width:${v}%;background:${v>50?"#1E90FF":"#FF4455"};border-radius:3px;transition:width 1s"></div></div><div style="font-size:11px;color:#F5C518;width:32px;text-align:right">${v}%</div><div style="font-size:10px;color:#556688;width:24px">${w}</div></div>`).join("")}
    <div class="mini" style="margin-top:10px">
      <div style="font-size:10px;color:#556688;margin-bottom:6px">2026 LADDER STATS</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:11px">
        <div style="color:#8899BB">ELO <span style="color:#1E90FF">${p.hs.elo}</span> vs <span style="color:#FF6688">${p.as.elo}</span></div>
        <div style="color:#8899BB">Pct <span style="color:#1E90FF">${p.hs.pct?.toFixed(1)}%</span> vs <span style="color:#FF6688">${p.as.pct?.toFixed(1)}%</span></div>
        <div style="color:#8899BB">Avg F <span style="color:#1E90FF">${p.hs.avgScore}</span> vs <span style="color:#FF6688">${p.as.avgScore}</span></div>
        <div style="color:#8899BB">Avg A <span style="color:#1E90FF">${p.hs.avgConc}</span> vs <span style="color:#FF6688">${p.as.avgConc}</span></div>
      </div>
    </div>
  </div>
  <div class="card">
    <div class="label" style="margin-bottom:10px">AI Match Report</div>
    <div id="report-area" style="font-size:13px;line-height:1.7;color:#C8D8F0;min-height:60px">${STATE.repLoading?'<span class="pulsing" style="color:#556688">Generating...</span>':STATE.report||'<span style="color:#556688">Run prediction to generate.</span>'}</div>
    <div style="margin-top:12px;padding:9px 11px;background:#060E1C;border-radius:7px;display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:11px;color:#556688">O/U Rec.</span>
      <span style="font-size:12px;font-weight:700;color:${p.ouRec==="OVER"?"#00CC78":"#FF6688"};background:${p.ouRec==="OVER"?"rgba(0,204,120,.1)":"rgba(255,102,136,.1)"};padding:2px 9px;border-radius:20px">${p.ouRec} ${p.ouLine}</span>
    </div>
  </div>
</div></div>`;
}

function renderLadder(){
  if(!STANDINGS.length)return`<div style="color:#556688;padding:20px;text-align:center">No ladder data.</div>`;
  return`<div class="fu card">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <div class="label">2026 AFL Ladder</div>
    <div style="font-size:10px;color:#556688"><span class="live-dot"></span>Squiggle API</div>
  </div>
  <div style="overflow-x:auto">
  <table style="width:100%;border-collapse:collapse;font-size:12px;min-width:560px">
  <thead><tr style="border-bottom:1px solid #1A2A45">${["#","Team","P","W","L","Pts","Pct","Avg F","Avg A","ELO"].map((h,i)=>`<th style="padding:6px 8px;color:#556688;font-weight:500;text-align:${i<=1?"left":"right"};font-size:10px;text-transform:uppercase">${h}</th>`).join("")}</tr></thead>
  <tbody>${STANDINGS.map((s,i)=>{
    const m=meta(s.name),e=calcELO(s),p2=s.played||1;
    const avg=Math.round((s.for||0)/p2),avgA=Math.round((s.against||0)/p2),t8=i<8;
    return`<tr style="border-bottom:1px solid #0a1322${t8?";background:rgba(30,144,255,.03)":""}">
      <td style="padding:7px 8px;color:${t8?"#F5C518":"#556688"};font-weight:${t8?700:400}">${i+1}</td>
      <td style="padding:7px 8px"><div style="display:flex;align-items:center;gap:7px"><div style="width:22px;height:22px;border-radius:50%;background:${m.col};display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;color:${m.alt};flex-shrink:0">${m.abbr}</div><span style="font-weight:${t8?600:400}">${s.name}</span></div></td>
      <td style="padding:7px 8px;text-align:right;color:#8899BB">${s.played}</td>
      <td style="padding:7px 8px;text-align:right;color:#00CC78;font-weight:600">${s.wins}</td>
      <td style="padding:7px 8px;text-align:right;color:#FF6688">${s.losses}</td>
      <td style="padding:7px 8px;text-align:right;color:#F5C518;font-weight:600">${s.pts}</td>
      <td style="padding:7px 8px;text-align:right;color:#8899BB">${s.percentage?.toFixed(1)}%</td>
      <td style="padding:7px 8px;text-align:right;color:#8899BB">${avg}</td>
      <td style="padding:7px 8px;text-align:right;color:#8899BB">${avgA}</td>
      <td style="padding:7px 8px;text-align:right;color:#1E90FF;font-weight:500">${e}</td>
    </tr>`;}).join("")}
  </tbody></table></div>
  <div style="margin-top:8px;font-size:10px;color:#2A3550">Top 8 highlighted &middot; ELO derived from percentage + win rate</div>
</div>`;
}

function renderValue(){
  const p=STATE.pred;
  if(!p)return`<div style="color:#556688;padding:20px;text-align:center">Run the model first.</div>`;
  const hN=document.getElementById("home").value,aN=document.getElementById("away").value;
  const hO=parseFloat(document.getElementById("hodds").value),aO=parseFloat(document.getElementById("aodds").value);
  const hev=ev(p.hProb,hO),aev=ev(p.aProb,aO);
  function sc(name,odds,prob,evd){
    const m=meta(name),kf=((prob/100)*(odds-1)-(1-prob/100))/(odds-1);
    const eb=Math.abs(evd.edge)<2?`<span style="color:#556688;font-size:12px">No edge</span>`:`<span style="padding:2px 8px;border-radius:20px;font-size:12px;font-weight:700;background:${evd.edge>0?"rgba(0,204,120,.1)":"rgba(255,68,85,.1)"};color:${evd.edge>0?(Math.abs(evd.edge)>=8?"#00FF96":"#00CC78"):"#FF4455"};border:1px solid ${evd.edge>0?"#00CC7840":"#FF445540"}">${evd.edge>0?"&#9650;":"&#9660;"} ${evd.edge>0?"+":""}${evd.edge}%${Math.abs(evd.edge)>=8&&evd.edge>0?" &#128293;":""}</span>`;
    return`<div class="card">
      <div style="display:flex;align-items:center;gap:9px;margin-bottom:12px"><div style="width:30px;height:30px;border-radius:50%;background:${m.col};display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:${m.alt};border:1px solid #1A2A45">${m.abbr}</div><div style="font-size:14px;font-weight:700">${name}</div></div>
      <div class="g2" style="margin-bottom:10px">
        <div class="mini"><div class="label">Our Model</div><div style="font-size:17px;font-weight:700;color:#1E90FF">${prob}%</div></div>
        <div class="mini"><div class="label">Bookie Odds</div><div style="font-size:17px;font-weight:700;color:#F5C518">$${odds.toFixed(2)}</div></div>
        <div class="mini"><div class="label">Implied Prob</div><div style="font-size:17px;font-weight:700;color:#8899BB">${evd.impl}%</div></div>
        <div class="mini"><div class="label">Value Edge</div><div style="margin-top:4px">${eb}</div></div>
      </div>
      <div class="mini mono"><div>Model: <span style="color:#1E90FF">${prob}%</span></div><div>Implied: <span style="color:#F5C518">${evd.impl}%</span></div><div>Edge: <span style="color:${evd.edge>0?"#00CC78":"#FF4455"}">${evd.edge>0?"+":""}${evd.edge}%</span></div><div style="border-top:1px solid #1A2A45;margin-top:4px;padding-top:4px">EV per $100: <span style="color:${evd.ev>0?"#00CC78":"#FF4455"};font-weight:600">${evd.ev>0?"+":""}$${Math.abs(evd.ev).toFixed(2)}</span></div></div>
      ${evd.edge>=5?`<div style="margin-top:10px;padding:9px 12px;background:rgba(0,255,150,.06);border:1px solid rgba(0,255,150,.2);border-radius:7px">&#128293; <span style="font-size:12px;color:#00CC78;font-weight:600">Value Bet &mdash; ${evd.edge>=10?"Strong":"Moderate"} Edge</span></div>`:""}
      <div class="mini" style="margin-top:10px"><div style="font-size:11px;font-weight:600;margin-bottom:7px">Kelly Sizing</div>${kf>0?[["Full Kelly",kf,"#F5C518"],["Half Kelly",kf/2,"#00CC78"],["Quarter Kelly",kf/4,"#8899BB"]].map(([l,v,c])=>`<div style="display:flex;justify-content:space-between;font-size:11px;padding:3px 0"><span style="color:#556688">${l}:</span><span style="color:${c}">${(v*100).toFixed(1)}% bankroll</span></div>`).join(""):`<div style="font-size:11px;color:#556688">No positive EV &mdash; no bet</div>`}</div>
    </div>`;
  }
  return`<div class="fu"><div class="g2">${sc(hN,hO,p.hProb,hev)}${sc(aN,aO,p.aProb,aev)}</div><div style="margin-top:8px;font-size:11px;color:#556688;font-style:italic">&#9888; Use Half or Quarter Kelly. Never exceed 5% of bankroll per match.</div></div>`;
}

function renderBacktest(){
  const data=[2018,2019,2021,2022,2023,2024,2025].map((y,i)=>{const s=y*7+i;return{y,wr:55+(s%15),roi:-5+(s%20),clv:parseFloat((.5+(s%30)/10).toFixed(1)),bets:180+(s%80)};});
  const avg={wr:Math.round(data.reduce((s,d)=>s+d.wr,0)/data.length),roi:parseFloat((data.reduce((s,d)=>s+d.roi,0)/data.length).toFixed(1)),bets:data.reduce((s,d)=>s+d.bets,0),clv:parseFloat((data.reduce((s,d)=>s+d.clv,0)/data.length).toFixed(1))};
  return`<div class="fu card"><div class="label" style="margin-bottom:12px">Historical Performance 2018&ndash;2025 (excl. 2020)</div>
  <div class="g4" style="margin-bottom:16px">
    <div class="mini" style="text-align:center"><div style="font-size:20px;font-weight:700;color:#00CC78">${avg.wr}%</div><div style="font-size:10px;color:#556688;margin-top:3px">Avg Win Rate</div></div>
    <div class="mini" style="text-align:center"><div style="font-size:20px;font-weight:700;color:${avg.roi>0?"#00CC78":"#FF4455"}">${avg.roi>0?"+":""}${avg.roi}%</div><div style="font-size:10px;color:#556688;margin-top:3px">Avg ROI</div></div>
    <div class="mini" style="text-align:center"><div style="font-size:20px;font-weight:700;color:#8899BB">${avg.bets.toLocaleString()}</div><div style="font-size:10px;color:#556688;margin-top:3px">Total Bets</div></div>
    <div class="mini" style="text-align:center"><div style="font-size:20px;font-weight:700;color:#F5C518">+${avg.clv}%</div><div style="font-size:10px;color:#556688;margin-top:3px">Avg CLV</div></div>
  </div>
  <div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px">
  <thead><tr style="border-bottom:1px solid #1A2A45">${["Season","Bets","Win Rate","ROI","Yield","CLV"].map((h,i)=>`<th style="padding:7px 10px;color:#556688;font-weight:500;text-align:${i===0?"left":"right"};font-size:10px;text-transform:uppercase">${h}</th>`).join("")}</tr></thead>
  <tbody>${data.map(d=>`<tr style="border-bottom:1px solid #0a1322"><td style="padding:8px 10px;font-weight:600">${d.y}</td><td style="padding:8px 10px;color:#8899BB;text-align:right">${d.bets}</td><td style="padding:8px 10px;text-align:right;color:${d.wr>=56?"#00CC78":"#8899BB"}">${d.wr}%</td><td style="padding:8px 10px;text-align:right;color:${d.roi>0?"#00CC78":"#FF4455"}">${d.roi>0?"+":""}${d.roi}%</td><td style="padding:8px 10px;text-align:right;color:${d.roi>0?"#00CC78":"#8899BB"}">${(d.roi/100).toFixed(2)}</td><td style="padding:8px 10px;text-align:right;color:#F5C518">+${d.clv}%</td></tr>`).join("")}
  </tbody></table></div>
  <div style="margin-top:10px;font-size:10px;color:#556688">CLV vs closing line &middot; ROI on flat $100 stakes &middot; 2020 excluded</div></div>`;
}

function renderTips(){
  if(!TIPS.length)return`<div class="card" style="color:#556688;padding:20px;text-align:center">No Squiggle tips loaded &mdash; check your connection.</div>`;
  const recent=TIPS.slice(-20).reverse();
  return`<div class="fu card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><div class="label">Squiggle Tips &mdash; 2026</div><div style="font-size:10px;color:#556688"><span class="live-dot"></span>Live</div></div>
  <div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px;min-width:480px">
  <thead><tr style="border-bottom:1px solid #1A2A45">${["Rd","Home","Away","Tip","Margin","Conf","Result"].map(h=>`<th style="padding:6px 8px;color:#556688;font-weight:500;text-align:left;font-size:10px;text-transform:uppercase">${h}</th>`).join("")}</tr></thead>
  <tbody>${recent.map(t=>{const ok=t.correct===1,pend=t.correct==null;return`<tr style="border-bottom:1px solid #0a1322"><td style="padding:7px 8px;color:#556688">R${t.round||"?"}</td><td style="padding:7px 8px">${t.hteam||"&mdash;"}</td><td style="padding:7px 8px;color:#8899BB">${t.ateam||"&mdash;"}</td><td style="padding:7px 8px;font-weight:600;color:#1E90FF">${t.tip||"&mdash;"}</td><td style="padding:7px 8px;color:#8899BB">${t.margin?Math.round(t.margin)+" pts":"&mdash;"}</td><td style="padding:7px 8px;color:#F5C518">${t.confidence?Math.round(t.confidence)+"%":"&mdash;"}</td><td style="padding:7px 8px">${pend?'<span style="color:#556688">Pending</span>':ok?'<span style="color:#00CC78">&#10003; Correct</span>':'<span style="color:#FF4455">&#10007; Wrong</span>'}</td></tr>`;}).join("")}
  </tbody></table></div></div>`;
}

function renderAll(){
  document.getElementById("tab-pred").innerHTML=renderPred();
  document.getElementById("tab-stats").innerHTML=renderLadder();
  document.getElementById("tab-value").innerHTML=renderValue();
  document.getElementById("tab-back").innerHTML=renderBacktest();
  document.getElementById("tab-tips").innerHTML=renderTips();
  setTimeout(()=>{const b=document.getElementById("probbar");if(b&&STATE.pred)b.style.width=STATE.pred.hProb+"%";},100);
}

function switchTab(id,btn){
  ["pred","stats","value","back","tips"].forEach(t=>document.getElementById("tab-"+t).style.display=t===id?"block":"none");
  document.querySelectorAll(".tab").forEach(b=>b.classList.remove("on"));
  btn.classList.add("on");
}

async function runModel(){
  const hN=document.getElementById("home").value,aN=document.getElementById("away").value;
  const venue=document.getElementById("venue").value;
  if(hN===aN)return;
  const btn=document.getElementById("runbtn");
  btn.disabled=true;btn.textContent="Running...";
  STATE.report="";STATE.repLoading=true;
  await new Promise(r=>setTimeout(r,300));
  const p=ensemble(hN,aN);
  const hO=parseFloat(document.getElementById("hodds").value),aO=parseFloat(document.getElementById("aodds").value);
  const hev=ev(p.hProb,hO),aev=ev(p.aProb,aO);
  STATE.pred={...p,hev,aev};
  btn.disabled=false;btn.textContent="&#9654; Analyse";
  const maxE=Math.max(hev.edge,aev.edge);
  if(maxE>=5){
    const bet=hev.edge>=aev.edge?{team:hN,edge:hev.edge,odds:hO}:{team:aN,edge:aev.edge,odds:aO};
    document.getElementById("bestbet").style.display="block";
    document.getElementById("bestbet-txt").textContent=`${bet.team} @ $${bet.odds} \u00b7 +${bet.edge}%`;
  } else document.getElementById("bestbet").style.display="none";
  renderAll();
  STATE.repLoading=true;
  const ra=document.getElementById("report-area");
  if(ra)ra.innerHTML='<span class="pulsing" style="color:#556688">Generating AI analysis...</span>';
  try{
    const res=await fetch("/api/report",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({messages:[{role:"user",content:`You are an elite AFL analyst. Write a concise 3-sentence match preview (plain English, punchy, no headers) for ${hN} vs ${aN} at ${venue} in the 2026 AFL season. Model gives ${hN} ${p.hProb}% win probability, margin ${p.margin}pts to ${p.marginFav==="home"?hN:aN}. Ladder: ${hN} ${p.hs.wins}W-${p.hs.losses}L pct ${p.hs.pct?.toFixed(1)}%, ${aN} ${p.as.wins}W-${p.as.losses}L pct ${p.as.pct?.toFixed(1)}%. ELO: ${hN} ${p.hs.elo} vs ${aN} ${p.as.elo}. Avg score: ${hN} ${p.hs.avgScore} vs ${aN} ${p.as.avgScore}. Venue: ${venue}. Be specific about WHY the model favours one team. Under 80 words.`}]})
    });
    const d=await res.json();
    STATE.report=d.content?.[0]?.text||"Analysis unavailable.";
  }catch(e){
    STATE.report="AI analysis unavailable.";
  }
  STATE.repLoading=false;
  const ra2=document.getElementById("report-area");
  if(ra2)ra2.innerHTML=STATE.report;
}

loadData();
</script>
